<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Art Audit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 20px;
    }
    h1 { margin-bottom: 8px; }
    p.desc { color: #888; margin-bottom: 20px; font-size: 0.9rem; }
    h2 { margin: 24px 0 12px; color: #f59e0b; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 16px;
    }
    .card {
      background: #1a1a2e;
      border-radius: 12px;
      overflow: hidden;
      border: 2px solid #333;
    }
    .card.flagged { border-color: #ef4444; }
    .card img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .card .info {
      padding: 8px 10px;
    }
    .card .filename {
      font-size: 0.8rem;
      font-weight: 600;
      word-break: break-all;
    }
    .card .checklist {
      font-size: 0.7rem;
      color: #888;
      margin-top: 4px;
    }
    .card .btn-flag {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 6px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .card:not(.flagged) .btn-flag {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }
    .card.flagged .btn-flag {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }
    #summary {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #1a1a2e;
      border-top: 2px solid #333;
      padding: 12px 20px;
      font-size: 0.9rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #flagged-list { color: #ef4444; }
    body { padding-bottom: 60px; }
  </style>
</head>
<body>
  <h1>Card Art Audit</h1>
  <p class="desc">Check each image for: grids/collages, white borders/frames, wrong style, low quality. Click "Flag" on any that need regeneration.</p>

  <h2>Dragon Portraits</h2>
  <div class="grid" id="portraits"></div>

  <h2>Enemy Portraits</h2>
  <div class="grid" id="enemies"></div>

  <h2>Fire Cards</h2>
  <div class="grid" id="fire"></div>

  <h2>Water Cards</h2>
  <div class="grid" id="water"></div>

  <h2>Earth Cards</h2>
  <div class="grid" id="earth"></div>

  <h2>Air Cards</h2>
  <div class="grid" id="air"></div>

  <h2>Neutral Cards</h2>
  <div class="grid" id="neutral"></div>

  <div id="summary">
    <span>Flagged: <span id="flagged-list">none</span></span>
    <button onclick="copyFlagged()" style="padding:6px 16px;border:none;border-radius:6px;background:#f59e0b;color:#000;font-weight:600;cursor:pointer">Copy flagged list</button>
  </div>

  <script>
    const images = {
      portraits: [
        'dragon_fire.png', 'dragon_water.png', 'dragon_earth.png', 'dragon_air.png',
      ],
      enemies: [
        'enemy_young_drake.png', 'enemy_storm_wyrm.png', 'enemy_ancient_dragon.png',
      ],
      fire: [
        'card_fire_strike.png', 'card_fire_blast.png', 'card_ember.png',
        'card_flame_shield.png', 'card_inferno.png',
      ],
      water: [
        'card_water_bolt.png', 'card_tidal_wave.png', 'card_ice_barrier.png',
        'card_healing_rain.png', 'card_cleanse.png',
      ],
      earth: [
        'card_rock_throw.png', 'card_earthquake.png', 'card_stone_wall.png',
        'card_fortify.png', 'card_thorns.png',
      ],
      air: [
        'card_gust.png', 'card_lightning.png', 'card_wind_shield.png',
        'card_tailwind.png', 'card_second_wind.png',
      ],
      neutral: [
        'card_dragon_claw.png', 'card_dragon_scales.png', 'card_dragon_breath.png',
      ],
    };

    const flagged = new Set();

    function renderGrid(containerId, files) {
      const container = document.getElementById(containerId);
      container.innerHTML = files.map(f => `
        <div class="card" id="card-${f}" data-file="${f}">
          <img src="images/${f}" alt="${f}" loading="lazy">
          <div class="info">
            <div class="filename">${f}</div>
            <div class="checklist">Check: single image, no frame, realistic style</div>
            <button class="btn-flag" onclick="toggleFlag('${f}')">Flag for regen</button>
          </div>
        </div>
      `).join('');
    }

    function toggleFlag(file) {
      const el = document.getElementById('card-' + file);
      if (flagged.has(file)) {
        flagged.delete(file);
        el.classList.remove('flagged');
        el.querySelector('.btn-flag').textContent = 'Flag for regen';
      } else {
        flagged.add(file);
        el.classList.add('flagged');
        el.querySelector('.btn-flag').textContent = 'Unflag';
      }
      updateSummary();
    }

    function updateSummary() {
      const list = document.getElementById('flagged-list');
      list.textContent = flagged.size ? [...flagged].join(', ') : 'none';
    }

    function copyFlagged() {
      const text = [...flagged].join('\n');
      navigator.clipboard.writeText(text).then(() => {
        alert('Copied ' + flagged.size + ' filenames to clipboard');
      });
    }

    // Render all grids
    for (const [id, files] of Object.entries(images)) {
      renderGrid(id, files);
    }
  </script>
</body>
</html>

# This workflow will install the required packages and run the Python script.

name: Generate Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.x'

    - name: Install requests
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run the script
      run: |
        python your_script.py  # Replace your_script.py with the actual script name

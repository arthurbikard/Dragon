<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Strategy Card Game</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #eaeaea; }
        #game-board { display: flex; justify-content: space-around; padding: 20px; border: 2px solid #333; background: #fff; margin-bottom: 20px; }
        .card { width: 100px; height: 150px; border: 1px solid #333; border-radius: 5px; text-align: center; padding: 10px; margin: 5px; }
        #player-stats { padding: 10px; background: #f9f9f9; border: 1px solid #ccc; margin-bottom: 20px; }
        #control-panel { padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h1>Dragon Strategy Card Game</h1>
    
    <div id="player-stats">
        <h2>Player Stats</h2>
        <p>Player: <span id="player-name">Player1</span></p>
        <p>Health: <span id="player-health">100</span></p>
        <p>Mana: <span id="player-mana">50</span></p>
    </div>
    
    <div id="game-board">
        <div class="card">
            <h3>Dragon Card 1</h3>
            <p>Type: Fire</p>
            <p>Attack: 30</p>
            <p>Defense: 20</p>
        </div>
        <div class="card">
            <h3>Dragon Card 2</h3>
            <p>Type: Water</p>
            <p>Attack: 25</p>
            <p>Defense: 25</p>
        </div>
        <div class="card">
            <h3>Dragon Card 3</h3>
            <p>Type: Earth</p>
            <p>Attack: 20</p>
            <p>Defense: 30</p>
        </div>
        <div class="card">
            <h3>Dragon Card 4</h3>
            <p>Type: Air</p>
            <p>Attack: 15</p>
            <p>Defense: 35</p>
        </div>
    </div>
    
    <div id="control-panel">
        <button onclick="startGame()">Start Game</button>
        <button onclick="endGame()">End Game</button>
    </div>
    
    <script>
        function startGame() {
            alert('Game Started!');
        }
        function endGame() {
            alert('Game Ended!');
        }
    </script>
</body>
</html>

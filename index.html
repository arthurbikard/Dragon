<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dragon Strategy Card Game</title>
    <style>
        body { 
            font-family: Arial, sans-serif; 
            background-color: #eaeaea; 
            margin: 0;
            padding: 20px;
        }
        h1 { text-align: center; }
        #game-board { 
            display: flex; 
            justify-content: space-around; 
            padding: 20px; 
            border: 2px solid #333; 
            background: #fff; 
            margin-bottom: 20px; 
            flex-wrap: wrap;
        }
        .card { 
            width: 150px; 
            height: 220px; 
            border: 2px solid #333; 
            border-radius: 10px; 
            padding: 10px; 
            margin: 10px;
            background: #f5f5f5;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-image {
            width: 100%;
            height: 120px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #ddd;
        }
        .card h3 {
            margin: 5px 0;
            font-size: 14px;
        }
        .card p {
            margin: 3px 0;
            font-size: 12px;
        }
        #player-stats { 
            padding: 10px; 
            background: #f9f9f9; 
            border: 1px solid #ccc; 
            margin-bottom: 20px; 
        }
        #control-panel { 
            padding: 10px; 
            text-align: center; 
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        .loading {
            text-align: center;
            font-style: italic;
            color: #666;
        }
    </style>
</head>
<body>
    <h1>Dragon Strategy Card Game</h1>
    
    <div id="player-stats">
        <h2>Player Stats</h2>
        <p>Player: <span id="player-name">Player1</span></p>
        <p>Health: <span id="player-health">100</span></p>
        <p>Mana: <span id="player-mana">50</span></p>
    </div>
    
    <div id="game-board">
        <div class="card">
            <img src="" alt="Fire Dragon" class="card-image" id="card1-img">
            <h3>Fire Dragon</h3>
            <p>Type: Fire</p>
            <p>Attack: 30</p>
            <p>Defense: 20</p>
        </div>
        <div class="card">
            <img src="" alt="Water Dragon" class="card-image" id="card2-img">
            <h3>Water Dragon</h3>
            <p>Type: Water</p>
            <p>Attack: 25</p>
            <p>Defense: 25</p>
        </div>
        <div class="card">
            <img src="" alt="Earth Dragon" class="card-image" id="card3-img">
            <h3>Earth Dragon</h3>
            <p>Type: Earth</p>
            <p>Attack: 20</p>
            <p>Defense: 30</p>
        </div>
        <div class="card">
            <img src="" alt="Air Dragon" class="card-image" id="card4-img">
            <h3>Air Dragon</h3>
            <p>Type: Air</p>
            <p>Attack: 15</p>
            <p>Defense: 35</p>
        </div>
    </div>
    
    <div id="control-panel">
        <button onclick="startGame()">Start Game</button>
        <button onclick="endGame()">End Game</button>
        <button onclick="generateImages()">Regenerate Images</button>
    </div>
    
    <script src="https://js.puter.com/v2/"></script>
    <script>
        async function generateImages() {
            const cards = [
                { id: 'card1-img', prompt: 'A realistic majestic fire dragon with red and orange scales, breathing flames, fantasy art style, high quality' },
                { id: 'card2-img', prompt: 'A realistic water dragon with blue scales, swimming through water, magnificent, fantasy art style, high quality' },
                { id: 'card3-img', prompt: 'A realistic earth dragon with brown and green scales, standing on rocky ground, fantasy art style, high quality' },
                { id: 'card4-img', prompt: 'A realistic air dragon with white and silver scales, flying in clouds, fantasy art style, high quality' }
            ];

            for (let card of cards) {
                try {
                    const img = await puter.ai.txt2img(card.prompt);
                    document.getElementById(card.id).src = img.src;
                } catch (error) {
                    console.log('Image generation in progress or error for ' + card.id);
                    document.getElementById(card.id).style.background = '#ccc';
                }
            }
        }

        function startGame() {
            alert('Game Started!');
        }
        
        function endGame() {
            alert('Game Ended!');
        }

        // Generate images on page load
        window.addEventListener('load', function() {
            generateImages();
        });
    </script>
</body>
</html>
